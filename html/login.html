<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Win95</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="win95-avatar">
            <div class="win95-avatar-circle">
                <svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="avatarGradient" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#3ad29f"/>
                            <stop offset="100%" stop-color="#2196f3"/>
                        </radialGradient>
                    </defs>
                    <!-- Cabeça -->
                    <circle cx="45" cy="32" r="20" fill="url(#avatarGradient)" stroke="#008080" stroke-width="3"/>
                    <!-- Corpo -->
                    <path d="M20 80 Q45 60 70 80" stroke="#2196f3" stroke-width="6" fill="none"/>
                    <ellipse cx="45" cy="70" rx="22" ry="12" fill="#3ad29f" fill-opacity="0.3"/>
                </svg>
            </div>
        </div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Email" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <div class="login-links">
            <span class="win95-link-text">Ainda não possui uma conta</span>
            <a href="#" id="createAccount">Criar nova conta</a>
        </div>
    </div>
    <script>
        // Login simples
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            if(username === 'admin' && password === '1234') {
                if(errorMsg) errorMsg.style.display = 'none';
                alert('Login realizado com sucesso!');
            } else {
                if(errorMsg) {
                  errorMsg.textContent = 'Usuário ou senha incorretos.';
                  errorMsg.style.display = 'block';
                } else {
                  alert('Usuário ou senha incorretos.');
                }
            }
        });
        document.getElementById('createAccount').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Função de criação de conta não implementada.');
        });
    </script>
</body>
</html>
